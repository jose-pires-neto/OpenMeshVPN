<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>OpenMeshVPN — Iniciando...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0f19;
            color: #94a3b8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
            user-select: none;
        }
        .logo {
            font-size: 48px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        h1 { font-size: 24px; color: #e2e8f0; font-weight: 600; }
        p  { font-size: 14px; color: #64748b; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #1e293b;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo">🌐</div>
    <h1>OpenMeshVPN</h1>
    <div class="spinner"></div>
    <p>Iniciando motor de rede...</p>
</body>
</html>
